<!DOCTYPE html>
<html lang="de" data-theme="beige">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Logic Organizer</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300&display=swap" rel="stylesheet">
<style>
  /* ---- THEMES ---- */
  :root[data-theme="beige"] {
    --bg: #F8F7F4; --surface: #FFFFFF; --border: #E2E0DA; --text: #1A1917; --muted: #7A7870;
    --green: #1B6B47; --green-light: #EAF4EE;
    --amber: #92600A; --amber-light: #FEF3DC;
    --red: #A8292A; --red-light: #FDEAEA;
    --topbar-bg: #1A1917; --topbar-text: #F8F7F4;
    --hover: #FAFAF8; --table-header: #F5F4F0;
  }
  :root[data-theme="white"] {
    --bg: #FFFFFF; --surface: #FAFAFA; --border: #E5E5E5; --text: #111111; --muted: #6B6B6B;
    --green: #0F5132; --green-light: #E8F2EC;
    --amber: #7A4F00; --amber-light: #FCF0D9;
    --red: #8B1F1F; --red-light: #FBE5E5;
    --topbar-bg: #111111; --topbar-text: #FFFFFF;
    --hover: #F2F2F2; --table-header: #F0F0F0;
  }
  :root[data-theme="dark"] {
    --bg: #0E0E10; --surface: #18181B; --border: #2A2A2E; --text: #F5F5F4; --muted: #8E8E93;
    --green: #4ADE80; --green-light: #14321F;
    --amber: #FACC15; --amber-light: #3B2F08;
    --red: #F87171; --red-light: #3D1414;
    --topbar-bg: #000000; --topbar-text: #F5F5F4;
    --hover: #1F1F23; --table-header: #1A1A1D;
  }
  :root[data-theme="blue"] {
    --bg: #0A1628; --surface: #112138; --border: #1F3654; --text: #E8EEF7; --muted: #8B9AAF;
    --green: #6EE7B7; --green-light: #0F2F22;
    --amber: #FCD34D; --amber-light: #2F260A;
    --red: #FCA5A5; --red-light: #2F1212;
    --topbar-bg: #050D1A; --topbar-text: #E8EEF7;
    --hover: #162B47; --table-header: #0E1D32;
  }

  :root {
    --mono: 'JetBrains Mono', monospace;
    --sans: 'DM Sans', sans-serif;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    transition: background 0.25s, color 0.25s;
  }

  .topbar {
    background: var(--topbar-bg);
    padding: 12px 48px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    transition: background 0.25s;
  }
  .topbar-logo {
    font-family: var(--mono);
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 0.14em;
    color: var(--topbar-text);
    text-transform: uppercase;
  }
  .topbar-actions { display: flex; align-items: center; gap: 10px; }
  .lang-switcher {
    display: flex;
    gap: 0;
    background: rgba(255,255,255,0.06);
    border-radius: 6px;
    padding: 3px;
  }
  .lang-btn {
    background: transparent;
    border: none;
    color: rgba(255,255,255,0.55);
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    padding: 6px 12px;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .lang-btn:hover { color: var(--topbar-text); }
  .lang-btn.active {
    background: var(--topbar-text);
    color: var(--topbar-bg);
  }
  .settings-btn {
    background: rgba(255,255,255,0.06);
    border: none;
    color: rgba(255,255,255,0.7);
    width: 32px; height: 32px;
    border-radius: 6px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
  }
  .settings-btn:hover { background: rgba(255,255,255,0.12); color: var(--topbar-text); }
  .settings-btn svg { width: 16px; height: 16px; }

  /* SETTINGS PANEL */
  .settings-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    backdrop-filter: blur(4px);
    z-index: 999;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }
  .settings-overlay.open {
    opacity: 1;
    pointer-events: auto;
  }
  .settings-panel {
    position: fixed;
    top: 60px;
    right: 48px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 22px;
    width: 320px;
    z-index: 1000;
    box-shadow: 0 12px 48px rgba(0,0,0,0.25);
    opacity: 0;
    transform: translateY(-8px);
    pointer-events: none;
    transition: all 0.2s ease-out;
  }
  .settings-panel.open {
    opacity: 1;
    transform: translateY(0);
    pointer-events: auto;
  }
  .settings-title {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 14px;
  }
  .settings-section { margin-bottom: 18px; }
  .settings-section:last-child { margin-bottom: 0; }
  .settings-section-label {
    font-size: 12px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 10px;
  }
  .theme-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .theme-option {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 10px;
    transition: all 0.15s;
  }
  .theme-option:hover { border-color: var(--muted); }
  .theme-option.active {
    border-color: var(--text);
    box-shadow: 0 0 0 2px var(--bg), 0 0 0 3px var(--text);
  }
  .theme-swatch {
    width: 28px; height: 28px;
    border-radius: 5px;
    border: 1px solid var(--border);
    flex-shrink: 0;
  }
  .swatch-beige { background: linear-gradient(135deg, #F8F7F4 50%, #1A1917 50%); }
  .swatch-white { background: linear-gradient(135deg, #FFFFFF 50%, #111111 50%); }
  .swatch-dark  { background: linear-gradient(135deg, #0E0E10 50%, #4ADE80 50%); }
  .swatch-blue  { background: linear-gradient(135deg, #0A1628 50%, #6EE7B7 50%); }
  .theme-label {
    font-size: 12px;
    color: var(--text);
    font-weight: 500;
  }

  .lang-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 6px;
  }
  .lang-option {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px;
    cursor: pointer;
    text-align: center;
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 600;
    color: var(--text);
    transition: all 0.15s;
  }
  .lang-option:hover { border-color: var(--muted); }
  .lang-option.active {
    background: var(--text);
    color: var(--bg);
    border-color: var(--text);
  }

  /* HERO */
  .hero {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 56px 48px 44px;
    transition: background 0.25s, border-color 0.25s;
  }
  .hero-label {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.2em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 18px;
  }
  .hero-title {
    font-size: clamp(30px, 4vw, 50px);
    font-weight: 300;
    letter-spacing: -0.025em;
    line-height: 1.08;
    margin-bottom: 14px;
  }
  .hero-title strong { font-weight: 600; }
  .hero-sub { font-size: 14px; color: var(--muted); max-width: 560px; line-height: 1.6; }

  .main { max-width: 900px; margin: 0 auto; padding: 52px 48px 96px; display: grid; gap: 44px; }

  .section-label {
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  .formula-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 26px 28px 20px;
    transition: background 0.25s, border-color 0.25s;
  }
  .formula-parts { display: flex; align-items: center; flex-wrap: wrap; gap: 4px; margin-bottom: 16px; }
  .fp { font-family: var(--mono); font-size: 14px; font-weight: 600; padding: 7px 13px; border-radius: 5px; }
  .fp-type { background: var(--green-light); color: var(--green); }
  .fp-num  { background: var(--amber-light); color: var(--amber); }
  .fp-sep  { background: transparent; color: var(--muted); padding: 7px 3px; font-weight: 400; font-size: 16px; }
  .fp-ver  { background: var(--red-light); color: var(--red); }
  .formula-legend { display: flex; gap: 20px; flex-wrap: wrap; padding-top: 14px; border-top: 1px solid var(--border); }
  .fl-item { display: flex; align-items: center; gap: 7px; font-size: 11px; color: var(--muted); }
  .fl-dot { width: 9px; height: 9px; border-radius: 2px; flex-shrink: 0; }

  .legend-table { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; transition: background 0.25s, border-color 0.25s; }
  .legend-row { display: grid; grid-template-columns: 52px 1fr; border-bottom: 1px solid var(--border); transition: background 0.12s; }
  .legend-row:last-child { border-bottom: none; }
  .legend-row:hover { background: var(--hover); }
  .legend-key { font-family: var(--mono); font-weight: 700; font-size: 14px; color: var(--green); padding: 15px 0 15px 22px; display: flex; align-items: center; border-right: 1px solid var(--border); }
  .legend-desc { padding: 15px 22px; font-size: 13px; color: var(--text); display: flex; align-items: center; }

  .version-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .version-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 22px 24px; transition: background 0.25s, border-color 0.25s; }
  .version-card-top { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .vc-code { font-family: var(--mono); font-size: 13px; font-weight: 700; }
  .vc-badge { font-size: 9px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; padding: 3px 9px; border-radius: 3px; }
  .vc-badge-obj { background: var(--amber-light); color: var(--amber); }
  .vc-badge-ver { background: var(--red-light); color: var(--red); }
  .vc-desc { font-size: 12px; color: var(--muted); line-height: 1.65; margin-bottom: 12px; }
  .vc-examples { display: flex; flex-direction: column; gap: 5px; padding-top: 12px; border-top: 1px solid var(--border); }
  .vc-ex { font-family: var(--mono); font-size: 11px; color: var(--muted); display: flex; align-items: center; gap: 8px; }
  .vc-ex strong { color: var(--text); font-weight: 600; }
  .vc-arrow { color: var(--border); }

  .proj-input-row {
    display: flex;
    align-items: center;
    gap: 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px 22px;
    margin-bottom: 12px;
    flex-wrap: wrap;
    transition: background 0.25s, border-color 0.25s;
  }
  .proj-label { font-family: var(--mono); font-size: 11px; letter-spacing: 0.05em; color: var(--muted); white-space: nowrap; }
  #projInput {
    font-family: var(--mono);
    font-size: 14px;
    font-weight: 700;
    color: var(--amber);
    background: var(--amber-light);
    border: 1px solid var(--amber);
    border-radius: 5px;
    padding: 7px 14px;
    outline: none;
    width: 180px;
    letter-spacing: 0.05em;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  #projInput:focus { box-shadow: 0 0 0 3px var(--amber-light); }
  .proj-hint { font-size: 11px; color: var(--muted); font-style: italic; }

  .examples-table { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; transition: background 0.25s, border-color 0.25s; }
  .ex-header { display: grid; grid-template-columns: 240px 1fr; background: var(--table-header); border-bottom: 1px solid var(--border); padding: 10px 22px; }
  .ex-header span { font-family: var(--mono); font-size: 9px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--muted); }
  .ex-row { display: grid; grid-template-columns: 240px 1fr; border-bottom: 1px solid var(--border); transition: background 0.12s; padding: 0 22px; }
  .ex-row:last-child { border-bottom: none; }
  .ex-row:hover { background: var(--hover); }
  .ex-code { font-family: var(--mono); font-size: 12px; font-weight: 700; color: var(--green); padding: 14px 20px 14px 0; border-right: 1px solid var(--border); display: flex; align-items: center; }
  .ex-desc { padding: 14px 0 14px 20px; font-size: 12px; color: var(--muted); display: flex; align-items: center; }

  footer { border-top: 1px solid var(--border); padding: 20px 48px; display: flex; justify-content: space-between; align-items: center; font-size: 11px; color: var(--muted); font-family: var(--mono); background: var(--surface); transition: background 0.25s, border-color 0.25s; }

  @media (max-width: 640px) {
    .topbar, .hero, .main, footer { padding-left: 20px; padding-right: 20px; }
    .topbar { flex-direction: column; gap: 10px; }
    .settings-panel { right: 20px; left: 20px; width: auto; }
    .version-grid { grid-template-columns: 1fr; }
    .ex-header, .ex-row { grid-template-columns: 1fr; }
    .ex-code { border-right: none; padding-right: 0; border-bottom: 1px solid var(--border); }
    .ex-desc { padding-left: 0; }
    .lang-grid { grid-template-columns: repeat(4, 1fr); }
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-logo">Logic Organizer</div>
  <div class="topbar-actions">
    <div class="lang-switcher">
      <button class="lang-btn active" data-lang="de" onclick="setLang('de')">DE</button>
      <button class="lang-btn" data-lang="fr" onclick="setLang('fr')">FR</button>
      <button class="lang-btn" data-lang="en" onclick="setLang('en')">EN</button>
      <button class="lang-btn" data-lang="it" onclick="setLang('it')">IT</button>
    </div>
    <button class="settings-btn" onclick="toggleSettings()" title="Settings">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
    </button>
  </div>
</div>

<div class="settings-overlay" id="settingsOverlay" onclick="toggleSettings()"></div>
<div class="settings-panel" id="settingsPanel">
  <div class="settings-title" id="settingsTitleEl">Einstellungen</div>

  <div class="settings-section">
    <div class="settings-section-label" id="settingsThemeLbl">Theme</div>
    <div class="theme-grid">
      <div class="theme-option" data-theme="beige" onclick="setTheme('beige')">
        <div class="theme-swatch swatch-beige"></div>
        <div class="theme-label" data-theme-name="beige">Beige</div>
      </div>
      <div class="theme-option" data-theme="white" onclick="setTheme('white')">
        <div class="theme-swatch swatch-white"></div>
        <div class="theme-label" data-theme-name="white">Weiss</div>
      </div>
      <div class="theme-option" data-theme="dark" onclick="setTheme('dark')">
        <div class="theme-swatch swatch-dark"></div>
        <div class="theme-label" data-theme-name="dark">Dark</div>
      </div>
      <div class="theme-option" data-theme="blue" onclick="setTheme('blue')">
        <div class="theme-swatch swatch-blue"></div>
        <div class="theme-label" data-theme-name="blue">Blau</div>
      </div>
    </div>
  </div>

  <div class="settings-section">
    <div class="settings-section-label" id="settingsLangLbl">Sprache</div>
    <div class="lang-grid">
      <div class="lang-option" data-lang="de" onclick="setLang('de')">DE</div>
      <div class="lang-option" data-lang="fr" onclick="setLang('fr')">FR</div>
      <div class="lang-option" data-lang="en" onclick="setLang('en')">EN</div>
      <div class="lang-option" data-lang="it" onclick="setLang('it')">IT</div>
    </div>
  </div>
</div>

<div class="hero">
  <div class="hero-label" id="heroLabel"></div>
  <h1 class="hero-title" id="heroTitle"></h1>
  <p class="hero-sub" id="heroSub"></p>
</div>

<div class="main">

  <div>
    <div class="section-label" id="lblStructure"></div>
    <div class="formula-box">
      <div class="formula-parts">
        <span class="fp fp-type" id="fpType"></span>
        <span class="fp fp-num" id="fpProject"></span>
        <span class="fp fp-sep">_</span>
        <span class="fp fp-num" id="fpObject"></span>
        <span class="fp fp-sep">–</span>
        <span class="fp fp-ver" id="fpVersion"></span>
      </div>
      <div class="formula-legend">
        <div class="fl-item"><div class="fl-dot" style="background:var(--green)"></div><span id="flType"></span></div>
        <div class="fl-item"><div class="fl-dot" style="background:var(--amber)"></div><span id="flNum"></span></div>
        <div class="fl-item"><div class="fl-dot" style="background:var(--red)"></div><span id="flVer"></span></div>
      </div>
    </div>
  </div>

  <div>
    <div class="section-label" id="lblLegend"></div>
    <div class="legend-table" id="legendTable"></div>
  </div>

  <div>
    <div class="section-label" id="lblVersions"></div>
    <div class="version-grid">
      <div class="version-card">
        <div class="version-card-top">
          <span class="vc-code" style="color:var(--amber)">_001 / _002</span>
          <span class="vc-badge vc-badge-obj" id="badgeObj"></span>
        </div>
        <p class="vc-desc" id="descObj"></p>
        <div class="vc-examples">
          <div class="vc-ex"><strong>P…_001</strong><span class="vc-arrow">→</span><span id="exObj1"></span></div>
          <div class="vc-ex"><strong>P…_002</strong><span class="vc-arrow">→</span><span id="exObj2"></span></div>
        </div>
      </div>
      <div class="version-card">
        <div class="version-card-top">
          <span class="vc-code" style="color:var(--red)">-V1 / -V2</span>
          <span class="vc-badge vc-badge-ver" id="badgeVer"></span>
        </div>
        <p class="vc-desc" id="descVer"></p>
        <div class="vc-examples">
          <div class="vc-ex"><strong>…_001-V1</strong><span class="vc-arrow">→</span><span id="exVer1"></span></div>
          <div class="vc-ex"><strong>…_001-V2</strong><span class="vc-arrow">→</span><span id="exVer2"></span></div>
        </div>
      </div>
    </div>
  </div>

  <div>
    <div class="section-label" id="lblExamples"></div>
    <div class="proj-input-row">
      <span class="proj-label" id="projLabel"></span>
      <input id="projInput" type="text" value="20260638" oninput="updateExamples()" maxlength="20" />
      <span class="proj-hint" id="projHint"></span>
    </div>
    <div class="examples-table">
      <div class="ex-header">
        <span id="hdrCode"></span>
        <span id="hdrDesc"></span>
      </div>
      <div class="ex-row"><div class="ex-code" id="ex1"></div><div class="ex-desc" id="exd1"></div></div>
      <div class="ex-row"><div class="ex-code" id="ex2"></div><div class="ex-desc" id="exd2"></div></div>
      <div class="ex-row"><div class="ex-code" id="ex3"></div><div class="ex-desc" id="exd3"></div></div>
      <div class="ex-row"><div class="ex-code" id="ex4"></div><div class="ex-desc" id="exd4"></div></div>
      <div class="ex-row"><div class="ex-code" id="ex5"></div><div class="ex-desc" id="exd5"></div></div>
      <div class="ex-row"><div class="ex-code" id="ex6"></div><div class="ex-desc" id="exd6"></div></div>
      <div class="ex-row"><div class="ex-code" id="ex7"></div><div class="ex-desc" id="exd7"></div></div>
    </div>
  </div>

</div>

<footer>
  <span>Logic Organizer</span>
  <span>v1.0 · 2026</span>
</footer>

<script>
const translations = {

const templates = [
  { id: 'ex1', prefix: 'P', suffix: '_001-V1' },
  { id: 'ex2', prefix: 'P', suffix: '_001-V2' },
  { id: 'ex3', prefix: 'P', suffix: '_002-V1' },
  { id: 'ex4', prefix: 'A', suffix: '_001-V1' },
  { id: 'ex5', prefix: 'E', suffix: '_001-V1' },
  { id: 'ex6', prefix: 'C', suffix: '_001-V1' },
  { id: 'ex7', prefix: 'S', suffix: '_001-V1' },
];

let currentLang = 'de';
let currentTheme = 'beige';

function toggleSettings() {
  document.getElementById('settingsPanel').classList.toggle('open');
  document.getElementById('settingsOverlay').classList.toggle('open');
}

function setTheme(theme) {
  currentTheme = theme;
  document.documentElement.setAttribute('data-theme', theme);
  document.querySelectorAll('.theme-option').forEach(el => {
    el.classList.toggle('active', el.dataset.theme === theme);
  });
  localStorage.setItem('logicOrgTheme', theme);
}

function setLang(lang) {
  currentLang = lang;
  const t = translations[lang];
  document.documentElement.lang = lang;

  document.querySelectorAll('[data-lang]').forEach(el => {
    el.classList.toggle('active', el.dataset.lang === lang);
  });

  document.getElementById('heroLabel').textContent = t.heroLabel;
  document.getElementById('heroTitle').innerHTML = t.heroTitle;
  document.getElementById('heroSub').textContent = t.heroSub;
  document.getElementById('lblStructure').textContent = t.lblStructure;
  document.getElementById('lblLegend').textContent = t.lblLegend;
  document.getElementById('lblVersions').textContent = t.lblVersions;
  document.getElementById('lblExamples').textContent = t.lblExamples;
  document.getElementById('fpType').textContent = t.fpType;
  document.getElementById('fpProject').textContent = t.fpProject;
  document.getElementById('fpObject').textContent = t.fpObject;
  document.getElementById('fpVersion').textContent = t.fpVersion;
  document.getElementById('flType').textContent = t.flType;
  document.getElementById('flNum').textContent = t.flNum;
  document.getElementById('flVer').textContent = t.flVer;

  const legendHtml = t.legend.map(([k, d]) =>
    `<div class="legend-row"><div class="legend-key">${k}</div><div class="legend-desc">${d}</div></div>`
  ).join('');
  document.getElementById('legendTable').innerHTML = legendHtml;

  document.getElementById('badgeObj').textContent = t.badgeObj;
  document.getElementById('badgeVer').textContent = t.badgeVer;
  document.getElementById('descObj').textContent = t.descObj;
  document.getElementById('descVer').textContent = t.descVer;
  document.getElementById('exObj1').textContent = t.exObj1;
  document.getElementById('exObj2').textContent = t.exObj2;
  document.getElementById('exVer1').textContent = t.exVer1;
  document.getElementById('exVer2').textContent = t.exVer2;
  document.getElementById('projLabel').textContent = t.projLabel;
  document.getElementById('projHint').textContent = t.projHint;
  document.getElementById('hdrCode').textContent = t.hdrCode;
  document.getElementById('hdrDesc').textContent = t.hdrDesc;

  t.examples.forEach((desc, i) => {
    document.getElementById('exd' + (i+1)).textContent = desc;
  });

  // Settings labels
  document.getElementById('settingsTitleEl').textContent = t.settingsTitle;
  document.getElementById('settingsThemeLbl').textContent = t.settingsTheme;
  document.getElementById('settingsLangLbl').textContent = t.settingsLang;
  document.querySelectorAll('[data-theme-name]').forEach(el => {
    el.textContent = t.themeNames[el.dataset.themeName];
  });

  updateExamples();
  localStorage.setItem('logicOrgLang', lang);
}

function updateExamples() {
  const num = document.getElementById('projInput').value || '________';
  templates.forEach(t => {
    document.getElementById(t.id).textContent = t.prefix + num + t.suffix;
  });
}

const savedLang = localStorage.getItem('logicOrgLang') || 'de';
const savedTheme = localStorage.getItem('logicOrgTheme') || 'beige';
setTheme(savedTheme);
setLang(savedLang);
